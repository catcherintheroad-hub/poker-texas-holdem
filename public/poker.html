<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>德州扑克</title>
<style>
:root {
  --bg: #1a1a2e;
  --felt: #16213e;
  --gold: #e6b800;
  --chip-red: #c0392b;
  --text: #ecf0f1;
  --dealer: #f39c12;
  --fold-bg: #2d2d44;
  --card-back: #2c3e50;
  --card-front: #fff;
  --allin: #e74c3c;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; }
body { overflow: hidden; }

/* CARD STYLES */
.card {
  display: inline-flex; align-items: center; justify-content: center;
  width: 38px; height: 54px; border-radius: 5px; font-size: 14px; font-weight: bold;
  background: var(--card-front); color: #222;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  flex-shrink: 0;
}
.card.red { color: #c0392b; }
.card.face-down { background: var(--card-back); color: transparent; position: relative; }
.card.face-down::after { content: '🂠'; position: absolute; color: #555; font-size: 18px; }
.card-back { display: inline-block; width: 38px; height: 54px; border-radius: 5px; background: var(--card-back); box-shadow: 0 2px 6px rgba(0,0,0,0.3); }

/* LOBBY */
.screen {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; min-height: 100dvh;
  padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
}
.screen.active { display: flex; }
.logo { font-size: 28px; font-weight: 900; color: var(--gold); margin-bottom: 30px; letter-spacing: 2px; }
.btn { background: var(--gold); color: #111; border: none; border-radius: 12px; padding: 14px 28px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; max-width: 300px; margin: 8px auto; display: block; transition: transform 0.1s, opacity 0.1s; }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
.btn-danger { background: var(--chip-red); color: white; }
.input { background: #1e2642; border: 2px solid #2c3e50; border-radius: 12px; padding: 14px 16px; font-size: 16px; color: white; width: 100%; max-width: 300px; margin: 8px auto; display: block; text-align: center; outline: none; }
.input:focus { border-color: var(--gold); }
.label { font-size: 13px; color: #888; margin-top: 16px; text-align: center; }
.room-code { font-size: 48px; font-weight: 900; color: var(--gold); letter-spacing: 8px; margin: 16px 0; }

/* TABLE */
#table-screen { flex-direction: column; padding: 0; justify-content: flex-start; min-height: 100vh; min-height: 100dvh; }
.table-top {
  background: var(--felt); padding: max(10px, env(safe-area-inset-top)) 12px 10px;
  border-bottom: 2px solid #0a0f1e; position: sticky; top: 0; z-index: 10;
}
.table-info { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #888; }
.table-info .room-label { font-size: 11px; color: var(--gold); font-weight: bold; }
.table-links { display: flex; gap: 12px; align-items: center; }
.score-link { color: var(--gold); cursor: pointer; text-decoration: underline; }
.session-status { margin-top: 8px; font-size: 12px; color: #8fa0b5; text-align: center; }
.timer-status { margin-top: 4px; font-size: 12px; color: #d8e0ea; text-align: center; min-height: 16px; }
.control-row { display: flex; gap: 8px; width: 100%; max-width: 360px; margin-top: 10px; }
.mini-btn {
  flex: 1; background: #1e2642; color: var(--text); border: 1px solid #2c3e50;
  border-radius: 10px; padding: 10px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
}
.mini-btn.active { border-color: var(--gold); color: var(--gold); }
.mini-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status-muted { color: #8fa0b5; }

/* COMMUNITY CARDS */
.community-area { background: var(--felt); padding: 12px; text-align: center; border-bottom: 2px solid #0a0f1e; }
.community-label { font-size: 11px; color: #666; margin-bottom: 6px; }
.cards-row { display: flex; justify-content: center; gap: 8px; min-height: 54px; align-items: center; }
.pot-display { font-size: 16px; font-weight: 700; color: var(--gold); margin-top: 6px; }

/* PLAYERS */
.players-area {
  flex: 1; overflow-y: auto; padding: 8px;
  padding-bottom: calc(200px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch;
}
.player-seat {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.03); border-radius: 10px;
  padding: 8px 10px; margin-bottom: 6px;
  border: 2px solid transparent;
  transition: border-color 0.2s;
}
.player-seat.current-turn { border-color: var(--gold); background: rgba(230,184,0,0.08); }
.player-seat.is-dealer { border-color: var(--dealer); }
.player-seat.is-folded { opacity: 0.5; }
.player-avatar { width: 36px; height: 36px; border-radius: 50%; background: #2c3e50; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.player-info { flex: 1; min-width: 0; }
.player-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-chips { font-size: 12px; color: var(--gold); }
.player-bet { font-size: 11px; color: #aaa; }
.player-role { font-size: 10px; background: var(--dealer); color: #111; padding: 1px 6px; border-radius: 8px; font-weight: bold; }
.player-hand { display: flex; gap: 4px; margin-left: auto; }
.player-status { font-size: 11px; padding: 2px 6px; border-radius: 6px; font-weight: bold; }
.status-active { background: #27ae60; color: white; }
.status-folded { background: #7f8c8d; color: white; }
.status-allin { background: var(--allin); color: white; }
.status-winner { background: var(--gold); color: #111; }

/* ACTION BAR */
.action-bar {
  background: #0a0f1e;
  padding: 12px 12px calc(20px + env(safe-area-inset-bottom));
  border-top: 2px solid var(--felt);
  flex-shrink: 0;
  position: sticky;
  bottom: 0;
  width: 100%;
  z-index: 12;
}
.action-bar.hidden { display: none; }
.bet-display { text-align: center; margin-bottom: 10px; font-size: 13px; color: #888; }
.bet-display span { color: var(--gold); font-weight: bold; font-size: 16px; }
.bet-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.bet-input { flex: 1; background: #1e2642; border: 2px solid #2c3e50; border-radius: 10px; padding: 10px 12px; font-size: 16px; color: white; text-align: center; outline: none; }
.bet-input:focus { border-color: var(--gold); }
.action-row { display: flex; gap: 8px; }
.action-btn {
  flex: 1; border: none; border-radius: 12px; padding: 14px 8px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
.action-btn:active { transform: scale(0.95); }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-check { background: #27ae60; color: white; }
.btn-call { background: #2980b9; color: white; }
.btn-raise { background: #8e44ad; color: white; }
.btn-fold { background: #c0392b; color: white; }
.btn-allin { background: #e74c3c; color: white; font-size: 13px; }

/* SCOREBOARD */
.scoreboard-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
  display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
}
.scoreboard-overlay.active { display: flex; }
.scoreboard-title { font-size: 22px; font-weight: 900; color: var(--gold); margin-bottom: 20px; }
.score-table { width: 100%; max-width: 360px; background: var(--felt); border-radius: 16px; overflow: hidden; }
.history-panel { width: 100%; max-width: 420px; background: var(--felt); border-radius: 16px; overflow: hidden; max-height: 70vh; overflow-y: auto; }
.history-section { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.history-section:last-child { border-bottom: none; }
.history-heading { font-size: 12px; color: #8fa0b5; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.history-item { padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.05); }
.history-item:first-child { border-top: none; padding-top: 0; }
.history-title { font-size: 14px; font-weight: 700; color: var(--text); }
.history-meta { margin-top: 4px; font-size: 12px; color: #8fa0b5; }
.history-empty { font-size: 13px; color: #8fa0b5; }
.score-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.score-row:last-child { border-bottom: none; }
.score-rank { width: 30px; font-size: 18px; font-weight: 900; color: var(--gold); }
.score-rank.gold { color: #f39c12; }
.score-rank.silver { color: #bdc3c7; }
.score-rank.bronze { color: #cd6133; }
.score-name { flex: 1; font-size: 15px; }
.score-pts { font-size: 15px; font-weight: bold; color: var(--gold); }
.close-btn { margin-top: 20px; background: var(--felt); border: 2px solid var(--gold); color: var(--gold); border-radius: 12px; padding: 12px 32px; font-size: 15px; font-weight: 700; cursor: pointer; }

/* WAITING ROOM */
.waiting-info { text-align: center; margin-bottom: 20px; }
.player-list { background: var(--felt); border-radius: 16px; width: 100%; max-width: 360px; overflow: hidden; }
.player-list-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 10px; }
.player-list-item:last-child { border-bottom: none; }
.player-list-item .avatar { width: 32px; height: 32px; background: #2c3e50; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.player-list-item .is-owner { background: var(--gold); color: #111; font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: bold; margin-left: auto; }

/* CHAT */
.chat-toggle {
  position: fixed; bottom: calc(90px + env(safe-area-inset-bottom)); right: 16px;
  background: var(--felt); border: 2px solid #2c3e50; color: #888; border-radius: 50%;
  width: 44px; height: 44px; font-size: 20px; cursor: pointer; z-index: 50; display: none;
}
.chat-toggle.visible { display: flex; align-items: center; justify-content: center; }
.chat-panel {
  position: fixed; bottom: calc(90px + env(safe-area-inset-bottom)); left: 12px; right: 80px;
  background: var(--felt); border: 2px solid #2c3e50; border-radius: 16px;
  display: none; flex-direction: column; max-height: 250px; z-index: 50;
}
.chat-panel.open { display: flex; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 10px 12px; }
.chat-msg { font-size: 13px; margin-bottom: 4px; }
.chat-msg .from { color: var(--gold); font-weight: 600; }
.chat-input-row { display: flex; gap: 6px; padding: 8px; border-top: 1px solid rgba(255,255,255,0.05); }
.chat-input { flex: 1; background: #1e2642; border: none; border-radius: 8px; padding: 8px 10px; font-size: 13px; color: white; outline: none; }
.chat-send { background: var(--gold); color: #111; border: none; border-radius: 8px; padding: 8px 12px; font-size: 13px; font-weight: bold; cursor: pointer; }

/* RESULT FLASH */
.result-flash {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
  display: none; flex-direction: column; align-items: center; justify-content: center;
}
.result-flash.active { display: flex; }
.result-title { font-size: 28px; font-weight: 900; color: var(--gold); margin-bottom: 16px; }
.result-hand { font-size: 18px; color: var(--text); margin-bottom: 8px; }
.result-winners { font-size: 16px; color: #27ae60; margin-bottom: 20px; }
.result-close { background: var(--gold); color: #111; border: none; border-radius: 12px; padding: 14px 32px; font-size: 16px; font-weight: 700; cursor: pointer; }

/* WAITING STATE */
.waiting-dots { color: var(--gold); font-size: 20px; letter-spacing: 4px; }

/* PHASE BADGE */
.phase-badge { display: inline-block; background: #2c3e50; color: #888; font-size: 11px; padding: 2px 8px; border-radius: 8px; margin-left: 6px; }

/* YOUR HAND */
.your-hand { background: var(--felt); border-top: 2px solid #0a0f1e; padding: 12px; text-align: center; }
.your-hand-label { font-size: 11px; color: #666; margin-bottom: 6px; }
.your-cards { display: flex; justify-content: center; gap: 10px; }

/* NOTIFICATION */
.notif {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--felt); border: 2px solid var(--gold); color: var(--text);
  padding: 10px 20px; border-radius: 12px; font-size: 14px; z-index: 300;
  display: none; animation: fadeIn 0.3s ease;
}
.notif.error { border-color: var(--chip-red); }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* HIDDEN */
.hidden { display: none !important; }

/* RESPONSIVE */
@media (max-width: 400px) {
  .card { width: 32px; height: 46px; font-size: 12px; }
  .card-back { width: 32px; height: 46px; }
  .logo { font-size: 24px; margin-bottom: 20px; }
  .room-code { font-size: 36px; letter-spacing: 6px; }
  .control-row { max-width: none; }
  .table-info { align-items: flex-start; gap: 8px; flex-direction: column; }
  .table-links { align-self: flex-end; flex-wrap: wrap; justify-content: flex-end; }
  .players-area { padding: 8px 8px calc(210px + env(safe-area-inset-bottom)); }
  .your-hand { position: sticky; bottom: calc(116px + env(safe-area-inset-bottom)); z-index: 11; }
  .player-seat { align-items: flex-start; flex-wrap: wrap; }
  .player-hand { width: 100%; margin-left: 44px; }
  .action-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 8px 8px calc(14px + env(safe-area-inset-bottom));
  }
  .action-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .action-btn:last-child { grid-column: 1 / -1; }
  .chat-panel { left: 8px; right: 64px; bottom: calc(80px + env(safe-area-inset-bottom)); }
  .chat-toggle { right: 10px; bottom: calc(80px + env(safe-area-inset-bottom)); }
}

@media (max-width: 340px) {
  .btn, .input { max-width: none; }
  .action-row { grid-template-columns: 1fr; }
  .bet-input-row { flex-direction: column; }
}
</style>
</head>
<body>

<!-- NOTIFICATION -->
<div id="notif" class="notif"></div>

<!-- LOBBY SCREEN -->
<div id="lobby-screen" class="screen active">
  <div class="logo">🃏 德州扑克</div>
  <input id="name-input" class="input" placeholder="你的名字" maxlength="20" />
  <button id="create-room-btn" class="btn">创建房间</button>

</div>

<!-- WAITING ROOM SCREEN -->
<div id="waiting-screen" class="screen">
  <div class="logo" style="font-size:18px;margin-bottom:10px">🃏 德州扑克</div>
  <div class="room-code" id="display-room-code">----</div>
  <div class="label">房间码，发给朋友邀请加入</div>
  <div style="height:20px"></div>
  <div class="waiting-info">
    <div id="player-count-display" style="color:#888;font-size:14px;margin-bottom:16px">等待玩家...</div>
    <div id="player-list" class="player-list"></div>
  </div>
  <div class="control-row">
    <button id="wait-sit-in" class="mini-btn">Sit In</button>
    <button id="wait-sit-out" class="mini-btn">Sit Out</button>

  </div>
  <div class="session-status" id="session-status">连接中...</div>
  <button id="start-btn" class="btn" disabled>等待至少2人后开始</button>
  <button id="leave-room-btn" class="btn btn-danger" style="max-width:200px;margin-top:8px">离开房间</button>
</div>

<!-- TABLE SCREEN -->
<div id="table-screen" class="screen">
  <div class="table-top">
    <div class="table-info">
      <div>
        <span class="room-label">房间 <span id="table-room-code">----</span></span>
        <span id="round-display" class="phase-badge"></span>
        <span id="phase-display" class="phase-badge"></span>
      </div>
      <div class="table-links">
        <div id="history-link" class="score-link">🕘 最近手牌</div>
        <div id="score-link" class="score-link">🏆 积分榜</div>
      </div>
    </div>
    <div class="control-row" style="max-width:none;margin-top:10px">
      <button id="table-sit-in" class="mini-btn">Sit In</button>
      <button id="table-sit-out" class="mini-btn">Sit Out</button>
      <button id="table-spectate" class="mini-btn">Spectate</button>
    </div>
    <div class="session-status" id="table-session-status">连接中...</div>
    <div class="timer-status" id="table-timer-status"></div>
  </div>

  <div class="community-area">
    <div class="community-label">公共牌</div>
    <div class="cards-row" id="community-cards">
      <div class="card-back"></div><div class="card-back"></div><div class="card-back"></div><div class="card-back"></div><div class="card-back"></div>
    </div>
    <div class="pot-display">底池: <span id="pot-display">0</span></div>
  </div>

  <div class="players-area" id="players-area"></div>

  <div class="your-hand" id="your-hand-area" style="display:none">

      <button class="action-btn btn-check" id="btn-check">过牌</button>
      <button class="action-btn btn-call" id="btn-call">跟注 0</button>
      <button class="action-btn btn-fold" id="btn-fold">弃牌</button>
      <button class="action-btn btn-raise" id="btn-raise">加注</button>
      <button class="action-btn btn-allin" id="btn-allin">All-in</button>
    </div>
  </div>
</div>

<!-- SCOREBOARD OVERLAY -->
<div id="scoreboard-overlay" class="scoreboard-overlay">
  <div class="scoreboard-title">🏆 积分榜</div>
  <div class="score-table" id="score-table" onclick="event.stopPropagation()"></div>
  <button id="close-scoreboard-btn" class="close-btn">关闭</button>
</div>

<!-- HISTORY OVERLAY -->
<div id="history-overlay" class="scoreboard-overlay">
  <div class="scoreboard-title">🕘 最近手牌</div>
  <div class="history-panel" id="history-panel"></div>
  <button id="close-history-btn" class="close-btn">关闭</button>
</div>

<!-- RESULT FLASH -->
<div id="result-flash" class="result-flash">
  <div class="result-title" id="result-title">赢家！</div>
  <div class="result-hand" id="result-hand"></div>
  <div class="result-winners" id="result-winners"></div>

</div>

<!-- CHAT PANEL -->
<button id="chat-toggle" class="chat-toggle">💬</button>
<div id="chat-panel" class="chat-panel">
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="chat-input" placeholder="说点什么..." maxlength="200" />
    <button id="chat-send-btn" class="chat-send">发</button>
  </div>
</div>

<script>
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
let ws = null;
let myPlayerId = null;
let myRoomCode = null;
let currentPhase = 'waiting';
let gameState = null;
let isMyTurn = false;
const SESSION_KEY = 'poker-session';
const pendingMessages = [];
let socketState = 'connecting';
let isRestoringSession = false;
let recentHistory = { recentHands: [], recentEvents: [] };
let timerTicker = null;

// ============================================================
// WEBSOCKET
// ============================================================
function connect() {
  socketState = 'connecting';
  updateSessionStatus();
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    socketState = 'connected';
    console.log('Connected');
    flushPendingMessages();
    const session = loadSession();
    if (session?.playerId && session?.roomCode) {
      isRestoringSession = true;
      updateSessionStatus();
      send({ type: 'resume_session', playerId: session.playerId, roomCode: session.roomCode });
    } else {
      isRestoringSession = false;
      updateSessionStatus();
    }
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
  ws.onclose = () => {
    socketState = 'reconnecting';
    isRestoringSession = false;
    updateSessionStatus();
    showNotif('连接断开，正在重连...', 'error');
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
    return true;
  }

  if (socketState === 'connecting') {
    pendingMessages.push(msg);
    updateSessionStatus();
    return false;
  }

  showNotif('连接尚未恢复，请稍后重试', 'error');
  return false;
}

function flushPendingMessages() {
  while (pendingMessages.length && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(pendingMessages.shift()));
  }
}

// ============================================================
// MESSAGE HANDLING
// ============================================================
function handleMessage(msg) {
  switch (msg.type) {
    case 'room_created':
    case 'room_joined':
    case 'session_resumed':
      myPlayerId = msg.playerId;
      myRoomCode = msg.roomCode;
      socketState = 'connected';
      isRestoringSession = false;
      saveSession({ playerId: myPlayerId, roomCode: myRoomCode });
      updateSessionStatus();
      if (msg.gameState) {
        currentPhase = msg.gameState.phase;
        gameState = msg.gameState;
        renderTable(msg.gameState);
      } else {
        showScreen('waiting');
        document.getElementById('display-room-code').textContent = msg.roomCode;
        updateWaitingRoom(msg.room);
      }
      break;

    case 'error':
      showNotif(msg.message, 'error');
      break;

    case 'session_invalid':
      socketState = 'connected';
      isRestoringSession = false;
      clearSession();
      myPlayerId = null;
      myRoomCode = null;
      updateSessionStatus();
      showScreen('lobby');
      showNotif(msg.message || '连接会话已失效', 'error');
      break;

    case 'player_joined':
      updateWaitingRoom({ players: msg.players, phase: 'waiting' });
      showNotif(msg.player.name + ' 加入了房间');
      break;

    case 'player_left':
      updateWaitingRoom({ players: msg.players, phase: 'waiting' });
      if (msg.newOwnerId === myPlayerId) showNotif('你已成为房主');
      break;

    case 'room_updated':
      if (msg.room) {
        updateWaitingRoom(msg.room);
      }
      break;

    case 'game_state':
      currentPhase = msg.phase;
      gameState = msg;
      recentHistory = msg.history || recentHistory;
      renderTable(msg);
      break;

    case 'engine_event':
      if (recentHistory.recentEvents) {
        recentHistory.recentEvents = [...recentHistory.recentEvents, msg.event].slice(-20);
      }
      handleEngineEvent(msg.event);
      break;

    case 'hand_result':
      if (msg.event && recentHistory.recentEvents) {
        recentHistory.recentEvents = [...recentHistory.recentEvents, msg.event].slice(-20);
      }
      showResultFlash(msg);
      break;

    case 'history_snapshot':
      recentHistory = msg.history || recentHistory;
      renderHistoryOverlay();
      break;

    case 'game_over':
      showNotif('游戏结束！' + (msg.winner ? msg.winner + ' 获胜！' : ''));
      break;

    case 'chat_message':
      addChatMessage(msg.from, msg.message);
      break;

    case 'action_result':
      break;
  }
}

// ============================================================
// LOBBY ACTIONS
// ============================================================
function createRoom() {
  const name = document.getElementById('name-input').value.trim() || 'Player';
  const bb = 10; // default big blind
  send({ type: 'create_room', playerName: name, bigBlind: bb, maxPlayers: 10 });
}

function joinRoom() {
  const name = document.getElementById('name-input').value.trim() || 'Player';
  const code = document.getElementById('join-code-input').value.trim().toUpperCase();
  if (!code) { showNotif('请输入房间码', 'error'); return; }
  send({ type: 'join_room', roomCode: code, playerName: name });
}

function startGame() {
  send({ type: 'start_game' });
}

function leaveRoom() {
  send({ type: 'leave_room' });
  myRoomCode = null;
  myPlayerId = null;
  pendingMessages.length = 0;
  clearSession();
  updateSessionStatus();
  showScreen('lobby');
}

// ============================================================
// WAITING ROOM
// ============================================================
function updateWaitingRoom(room) {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  for (const p of room.players) {
    const div = document.createElement('div');
    div.className = 'player-list-item';
    const statusBits = [];
    if (p.connectionState === 'disconnected') statusBits.push('断线');
    if (p.isSittingOut) statusBits.push('Sit Out');
    div.innerHTML = `
      <div class="avatar">${getEmoji(p.name)}</div>
      <div style="font-size:15px">${p.name}</div>
      <div style="font-size:12px;color:#888">${p.chips} 筹码</div>
      ${statusBits.length ? `<div class="status-muted">${statusBits.join(' · ')}</div>` : ''}
      ${p.id === myPlayerId ? '<span class="is-owner">你</span>' : ''}
    `;
    list.appendChild(div);
  }
  document.getElementById('player-count-display').textContent = `${room.players.length} 名玩家`;
  const startBtn = document.getElementById('start-btn');
  if (room.players.length >= 2) {
    startBtn.disabled = false;
    startBtn.textContent = '开始游戏';
  } else {
    startBtn.disabled = true;
    startBtn.textContent = '等待至少2人后开始';
  }
  document.getElementById('table-room-code').textContent = myRoomCode || '';
  const me = room.players.find(p => p.id === myPlayerId);
  updateParticipationButtons(me);
  updateSessionStatus();
  showScreen('waiting');
}

// ============================================================
// TABLE RENDERING
// ============================================================
function renderTable(state) {
  const hand = state.hand || {};
  const betting = hand.betting || {};
  const board = hand.board || state.communityCards || [];
  const roundNumber = hand.number ?? state.roundNumber;
  const handPhase = hand.phase || state.phase;
  const currentBet = betting.currentBet ?? state.currentBet ?? 0;
  const minRaise = betting.minRaise ?? state.minRaise ?? (state.bigBlind * 2);

  showScreen('table');
  document.getElementById('table-room-code').textContent = myRoomCode || '';
  document.getElementById('round-display').textContent = roundNumber ? `第${roundNumber}局` : '';
  document.getElementById('phase-display').textContent = phaseName(handPhase);

  // Community cards
  const cc = document.getElementById('community-cards');
  cc.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const c = board[i];
    if (c && c !== '?') {
      cc.appendChild(makeCard(c));
    } else {
      const back = document.createElement('div');
      back.className = 'card-back';
      cc.appendChild(back);
    }
  }

  document.getElementById('pot-display').textContent = betting.pot ?? state.pot ?? 0;

  // Players
  const area = document.getElementById('players-area');
  area.innerHTML = '';
  for (const p of state.players) {
    const isMe = p.id === myPlayerId;
    const seat = document.createElement('div');
    seat.className = 'player-seat';
    if (p.isCurrentTurn) seat.classList.add('current-turn');
    if (p.isDealer) seat.classList.add('is-dealer');
    if (p.isFolded) seat.classList.add('is-folded');

    let roleBadge = '';
    if (p.isDealer) roleBadge = '<span class="player-role">庄</span>';
    else if (p.isBigBlind) roleBadge = '<span class="player-role">大盲</span>';
    else if (p.isSmallBlind) roleBadge = '<span class="player-role">小盲</span>';

    let handHtml = '';
    if (p.hand && p.hand[0]) {
      if (p.isFolded || !isMe) {
        // Show face down for folded or other players
        handHtml = '<div class="player-hand"><div class="card-back"></div><div class="card-back"></div></div>';
      } else {
        handHtml = '<div class="player-hand">' + p.hand.map(c => makeCard(c).outerHTML).join('') + '</div>';
      }
    } else {
      handHtml = '<div class="player-hand"><div class="card-back"></div><div class="card-back"></div></div>';
    }

    let statusHtml = '';
    if (p.isFolded) statusHtml = '<span class="player-status status-folded">弃牌</span>';
    else if (p.isAllIn) statusHtml = '<span class="player-status status-allin">All-in</span>';
    else if (p.connectionState === 'disconnected') statusHtml = '<span class="player-status status-folded">断线</span>';
    else if (p.isSittingOut) statusHtml = '<span class="player-status status-folded">旁观</span>';
    else if (p.isCurrentTurn) statusHtml = '<span class="player-status status-active">行动中</span>';

    const lastAction = p.lastAction ? `<div class="player-bet">${p.lastAction}</div>` : '';
    const betDisplay = p.currentBet > 0 ? `<div class="player-bet">已下: ${p.currentBet}</div>` : '';

    seat.innerHTML = `
      <div class="player-avatar">${getEmoji(p.name)}</div>
      <div class="player-info">
        <div class="player-name">${isMe ? '你' : p.name}${roleBadge}</div>
        <div class="player-chips">💰 ${p.chips}</div>
        ${lastAction}${betDisplay}
      </div>
      ${handHtml}
      ${statusHtml}
    `;
    area.appendChild(seat);
  }

  // Your hand
  const myP = state.players.find(p => p.id === myPlayerId);
  updateParticipationButtons(myP);
  updateSessionStatus(myP);
  const yourHandArea = document.getElementById('your-hand-area');
  const myCards = document.getElementById('my-cards');
  if (myP && myP.hand && myP.hand[0] && myP.hand[0] !== '?') {
    yourHandArea.style.display = 'block';
    myCards.innerHTML = myP.hand.map(c => makeCard(c).outerHTML).join('');
  } else {
    yourHandArea.style.display = 'none';
  }

  // Action bar
  isMyTurn = state.currentPlayerId === myPlayerId && handPhase !== 'waiting' && handPhase !== 'showdown' && handPhase !== 'scoring';
  const actionBar = document.getElementById('action-bar');

  if (handPhase === 'waiting') {
    actionBar.classList.add('hidden');
    return;
  }
  actionBar.classList.remove('hidden');

  const toCall = currentBet;
  const myChips = myP ? myP.chips : 0;

  const btnCheck = document.getElementById('btn-check');
  const btnCall = document.getElementById('btn-call');
  const betInput = document.getElementById('bet-input');

  if (!isMyTurn) {
    btnCheck.disabled = true;
    btnCall.disabled = true;
    btnCheck.style.opacity = '0.4';
    btnCall.style.opacity = '0.4';
  } else {
    const diff = toCall - (myP?.currentBet || 0);
    if (diff === 0) {
      // Can check
      btnCheck.disabled = false;
      btnCall.disabled = true;
      btnCall.style.opacity = '0.4';
    } else {
      btnCheck.disabled = true;
      btnCall.disabled = false;
      btnCall.style.opacity = '1';
      btnCall.textContent = `跟注 ${diff}`;
    }
  }

  document.getElementById('to-call-display').textContent = toCall;
  document.getElementById('my-chips-display').textContent = myChips;
  betInput.max = myChips;
  betInput.placeholder = `最小加注 ${minRaise}`;

  document.getElementById('chat-toggle').classList.add('visible');
  syncTimerStatus(state.timers || {});
}

function makeCard(cardStr) {
  const div = document.createElement('div');
  if (!cardStr || cardStr === '?') { div.className = 'card-back'; return div; }
  const rank = cardStr.replace(/[♠♥♦♣]/, '').trim();
  const suit = cardStr.replace(rank, '');
  const isRed = suit === '♥' || suit === '♦';
  div.className = `card${isRed ? ' red' : ''}`;
  div.textContent = cardStr;
  return div;
}

function phaseName(phase) {
  const names = {
    waiting: '等待',
    preflop: '翻牌前',
    flop: '翻牌',
    turn: '转牌',
    river: '河牌',
    showdown: '摊牌',
    scoring: '计分',
  };
  return names[phase] || phase;
}

// ============================================================
// ACTIONS
// ============================================================
function doAction(action) {
  const betInput = document.getElementById('bet-input');
  const amount = parseInt(betInput.value) || 0;
  send({ type: 'action', action, amount });
  betInput.value = '';
}

function setParticipation(mode) {
  send({ type: mode });
}

function showScoreboard() {
  if (!gameState) return;
  const overlay = document.getElementById('scoreboard-overlay');
  const table = document.getElementById('score-table');
  table.innerHTML = '';
  const scores = gameState.scores || [];
  scores.forEach((s, i) => {
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `
      <div class="score-rank ${rankClass}">${i + 1}</div>
      <div class="score-name">${s.name}${s.id === myPlayerId ? ' (你)' : ''}</div>
      <div class="score-pts">${s.score} 分</div>
    `;
    table.appendChild(row);
  });
  overlay.classList.add('active');
}

function hideScoreboard() {
  document.getElementById('scoreboard-overlay').classList.remove('active');
}

function showHistoryOverlay() {
  if (myRoomCode) {
    send({ type: 'get_hand_history' });
  }
  renderHistoryOverlay();
  document.getElementById('history-overlay').classList.add('active');
}

function hideHistoryOverlay() {
  document.getElementById('history-overlay').classList.remove('active');
}

function renderHistoryOverlay() {
  const panel = document.getElementById('history-panel');
  const hands = recentHistory.recentHands || [];
  const events = recentHistory.recentEvents || [];
  panel.innerHTML = `
    <div class="history-section">
      <div class="history-heading">最近手牌</div>
      ${hands.length ? hands.map((hand) => `
        <div class="history-item">
          <div class="history-title">第${hand.handNumber || '-'}局 · ${hand.handType || '结束'}</div>
          <div class="history-meta">底池 ${hand.pot} · 公共牌 ${hand.communityCards.join(' ') || '无'}</div>
          <div class="history-meta">${hand.winners.map((winner) => `${winner.name} +${winner.prize}`).join(' / ')}</div>
        </div>
      `).join('') : '<div class="history-empty">还没有完成的手牌记录</div>'}
    </div>
    <div class="history-section">
      <div class="history-heading">最近事件</div>
      ${events.length ? [...events].reverse().map((event) => `
        <div class="history-item">
          <div class="history-title">${formatEngineEvent(event)}</div>
          <div class="history-meta">${formatTimestamp(event.ts)}</div>
        </div>
      `).join('') : '<div class="history-empty">还没有事件记录</div>'}
    </div>
  `;
}

function showResultFlash(msg) {
  const el = document.getElementById('result-flash');
  const winners = msg.winners || [];
  document.getElementById('result-title').textContent = winners.length > 1 ? '平局！' : '赢家！';
  document.getElementById('result-hand').textContent = winners[0]?.handType || '';
  document.getElementById('result-winners').textContent = winners.map(w => `${w.name} +${w.prize ?? msg.prize}`).join(', ');
  el.classList.add('active');
}

function handleEngineEvent(event) {
  if (!event) return;
  if (event.kind === 'phase_advanced' && event.nextPhase) {
    showNotif(`已进入${phaseName(event.nextPhase)}`);
  }
}

function syncTimerStatus(timers) {
  if (timerTicker) clearInterval(timerTicker);

  const target = document.getElementById('table-timer-status');
  const render = () => {
    if (!target) return;
    const now = Date.now();
    const actionMs = timers.actionDeadlineAt ? Math.max(0, timers.actionDeadlineAt - now) : 0;
    const disconnectMs = timers.viewerDisconnectDeadlineAt ? Math.max(0, timers.viewerDisconnectDeadlineAt - now) : 0;

    if (disconnectMs > 0) {
      target.textContent = `断线宽限剩余 ${Math.ceil(disconnectMs / 1000)}s`;
      return;
    }

    if (isMyTurn && actionMs > 0) {
      target.textContent = `你的操作剩余 ${Math.ceil(actionMs / 1000)}s`;
      return;
    }

    target.textContent = '';
  };

  render();
  timerTicker = setInterval(render, 1000);
}

function formatEngineEvent(event) {
  switch (event.kind) {
    case 'hand_started':
      return `第${event.handNumber}局开始`;
    case 'phase_advanced':
      return `推进到${phaseName(event.nextPhase)}`;
    case 'action_applied':
      return `动作已应用`;
    case 'player_action_requested':
      return `${event.playerId || '玩家'} 请求 ${event.action}`;
    case 'hand_finished':
      return `第${event.handNumber}局结束`;
    default:
      return event.kind || '事件';
  }
}

function formatTimestamp(value) {
  if (!value) return '';
  return new Date(value).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function closeResultFlash() {
  document.getElementById('result-flash').classList.remove('active');
}

// ============================================================
// CHAT
// ============================================================
function toggleChat() {
  document.getElementById('chat-panel').classList.toggle('open');
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  send({ type: 'chat', message: text });
  input.value = '';
}

function addChatMessage(from, text) {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<span class="from">${from}:</span> ${text}`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ============================================================
// UTILS
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const map = { lobby: 'lobby-screen', waiting: 'waiting-screen', table: 'table-screen' };
  document.getElementById(map[name])?.classList.add('active');
}

function showNotif(text, type) {
  const el = document.getElementById('notif');
  el.textContent = text;
  el.className = 'notif' + (type === 'error' ? ' error' : '');
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function getEmoji(name) {
  const emojis = ['🦊','🐼','🦁','🐯','🐨','🐸','🦄','🐲','🦅','🐬'];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return emojis[Math.abs(hash) % emojis.length];
}

function saveSession(session) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}

function loadSession() {
  try {
    return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
  } catch {
    return null;
  }
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}

function updateParticipationButtons(me) {
  const isSittingOut = !!me?.isSittingOut;
  const buttons = {
    sit_in: [document.getElementById('wait-sit-in'), document.getElementById('table-sit-in')],
    sit_out: [document.getElementById('wait-sit-out'), document.getElementById('table-sit-out')],
    spectate: [document.getElementById('wait-spectate'), document.getElementById('table-spectate')],
  };

  Object.values(buttons).flat().forEach((btn) => {
    if (!btn) return;
    btn.classList.remove('active');
  });

  buttons.sit_in.forEach((btn) => {
    if (!btn) return;
    btn.disabled = !myRoomCode || (me && !isSittingOut);
    if (me && !isSittingOut) btn.classList.add('active');
  });
  buttons.sit_out.forEach((btn) => {
    if (!btn) return;
    btn.disabled = !myRoomCode || (me && isSittingOut);
    if (me && isSittingOut) btn.classList.add('active');
  });
  buttons.spectate.forEach((btn) => {
    if (!btn) return;
    btn.disabled = !myRoomCode || (me && isSittingOut);
  });
}

function updateSessionStatus(me) {
  const statusText = isRestoringSession
    ? '正在恢复会话...'
    : socketState === 'connecting'
      ? '连接服务器中...'
    : socketState === 'reconnecting'
      ? '连接中断，正在重连...'
      : me?.connectionState === 'disconnected'
        ? '你当前处于断线宽限期'
        : myRoomCode
          ? '会话已连接'
          : '未加入房间';

  const waiting = document.getElementById('session-status');
  const table = document.getElementById('table-session-status');
  const lobby = document.getElementById('lobby-session-status');
  const createButton = document.getElementById('create-room-btn');
  const joinButton = document.getElementById('join-room-btn');
  if (createButton) createButton.disabled = socketState !== 'connected';
  if (joinButton) joinButton.disabled = socketState !== 'connected';
  if (lobby) lobby.textContent = statusText;
  if (waiting) waiting.textContent = statusText;
  if (table) table.textContent = statusText;
}

Object.assign(window, {
  closeResultFlash,
  createRoom,
  doAction,
  hideScoreboard,
  joinRoom,
  leaveRoom,
  sendChat,
  setParticipation,
  showScoreboard,
  startGame,
  toggleChat,
  __pokerDebug: {
    getState: () => ({
      currentPhase,
      isMyTurn,
      isRestoringSession,
      myPlayerId,
      myRoomCode,
      pendingMessages: pendingMessages.length,
      socketState,
    }),
    renderTableState: (state) => renderTable(state),
    renderWaitingRoom: (room) => updateWaitingRoom(room),
    setSessionState: (next) => {
      if (next.playerId !== undefined) myPlayerId = next.playerId;
      if (next.roomCode !== undefined) myRoomCode = next.roomCode;
      if (next.socketState !== undefined) socketState = next.socketState;
      if (next.isRestoringSession !== undefined) isRestoringSession = next.isRestoringSession;
      updateSessionStatus();
    },
  },
});

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('name-input').focus();
  document.getElementById('create-room-btn').addEventListener('click', createRoom);
  document.getElementById('join-room-btn').addEventListener('click', joinRoom);
  document.getElementById('name-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') createRoom(); });
  document.getElementById('join-code-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') joinRoom(); });
  document.getElementById('leave-room-btn').addEventListener('click', leaveRoom);
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('wait-sit-in').addEventListener('click', () => setParticipation('sit_in'));
  document.getElementById('wait-sit-out').addEventListener('click', () => setParticipation('sit_out'));
  document.getElementById('wait-spectate').addEventListener('click', () => setParticipation('spectate'));
  document.getElementById('table-sit-in').addEventListener('click', () => setParticipation('sit_in'));
  document.getElementById('table-sit-out').addEventListener('click', () => setParticipation('sit_out'));
  document.getElementById('table-spectate').addEventListener('click', () => setParticipation('spectate'));
  document.getElementById('btn-check').addEventListener('click', () => doAction('check'));
  document.getElementById('btn-call').addEventListener('click', () => doAction('call'));
  document.getElementById('btn-fold').addEventListener('click', () => doAction('fold'));
  document.getElementById('btn-raise').addEventListener('click', () => doAction('raise'));
  document.getElementById('btn-allin').addEventListener('click', () => doAction('allin'));
  document.getElementById('history-link').addEventListener('click', showHistoryOverlay);
  document.getElementById('score-link').addEventListener('click', showScoreboard);
  document.getElementById('history-overlay').addEventListener('click', hideHistoryOverlay);
  document.getElementById('close-history-btn').addEventListener('click', hideHistoryOverlay);
  document.getElementById('scoreboard-overlay').addEventListener('click', hideScoreboard);
  document.getElementById('close-scoreboard-btn').addEventListener('click', hideScoreboard);
  document.getElementById('result-close-btn').addEventListener('click', closeResultFlash);
  document.getElementById('chat-toggle').addEventListener('click', toggleChat);
  document.getElementById('chat-send-btn').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', (event) => {
    if (event.key === 'Enter') sendChat();
  });
  document.getElementById('history-panel').addEventListener('click', (event) => event.stopPropagation());
  document.getElementById('score-table').addEventListener('click', (event) => event.stopPropagation());
  updateSessionStatus();
  connect();
});
